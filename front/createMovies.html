<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./styles/reset.css" />
  <link rel="stylesheet" href="./styles/bootstrap.css" />
  <link rel="stylesheet" href="./styles/index.css" />

  <title>Create Movie | 112PELIS</title>

  <style>
    .create-container {
      max-width: 550px;
      margin: 120px auto;
      padding: 30px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      color: #fff;
    }

    .create-container h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
      font-weight: 700;
    }

    .form-label {
      margin-top: 10px;
      font-weight: 600;
    }

    .btn-save {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 12px;
      background: #007bff;
      border: none;
      color: #fff;
      font-weight: 600;
    }

    #formMsg {
      text-align: center;
      margin-top: 15px;
      font-size: 1rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s ease;
    }
  </style>
</head>

<body>


  <header class="navbar navbar-expand-lg">
    <img src="./assets/Captura de pantalla 2026-01-29 085957.png" alt="112PELIS" />

    <nav class="navbar-nav-wrapper">
      <ul class="nav">
        <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="./movies.html">Movies</a></li>
        <li class="nav-item"><a class="nav-link" href="./lastest.html">Lastest News</a></li>
        <li class="nav-item"><a class="nav-link active" href="./createMovies.html">Create Movie</a></li>
      </ul>
    </nav>
  </header>


  <main class="create-page">
  <div class="create-container">
    <section class="create-card">
      <h1>Cargar nueva película</h1>

      <form id="createMovieForm" class="create-form">

        <div class="field">
          <label for="title">Título *</label>
          <input id="title" type="text" placeholder="Ej: Titanic" required />
        </div>

        <div class="field">
          <label for="year">Año</label>
          <input id="year" type="number" placeholder="1997" min="1900" max="2100" />
        </div>

        <div class="field">
          <label for="director">Director</label>
          <input id="director" type="text" placeholder="James Cameron" />
        </div>

        <div class="field">
          <label for="duration">Duración</label>
          <input id="duration" type="text" placeholder="Ej: 2h 10min" />
        </div>

        <div class="field span-2">
          <label for="genre">Género (separado por comas)</label>
          <input id="genre" type="text" placeholder="Action, Drama" />
        </div>

        <div class="field">
          <label for="rate">Rating</label>
          <input id="rate" type="number" step="0.1" min="0" max="10" placeholder="7.5" />
        </div>

        <div class="field span-2">
          <label for="poster">Poster URL *</label>
          <input id="poster" type="url" placeholder="https://..." required />
        </div>

        <button class="btn-save" type="submit">Guardar película</button>
        <div id="formMsg"></div>

      </form>
    </section>
  </div>
</main>



  <script src="./scripts/createMovies.js"></script>

</body>
</html>
